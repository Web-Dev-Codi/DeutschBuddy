      - ["dennoch", "nevertheless", "Es war teuer. Dennoch kaufte er es."]
      - ["trotzdem", "despite that / still", "Sie war krank. Trotzdem kam sie."]
      - ["allerdings", "however / mind you", "Es ist schön. Allerdings ist es teuer."]
      - ["daher", "therefore (formal)", "Er kam zu spät. Daher verpasste er es."]
      - ["deshalb", "that's why", "Ich bin müde. Deshalb gehe ich früh."]
      - ["deswegen", "because of that", "Er fuhr zu schnell. Deswegen bekam er Strafe."]
      - ["außerdem", "moreover / besides", "Es ist günstig. Außerdem liegt es zentral."]
      - ["einerseits...andererseits", "on one hand...on the other", "Einerseits will ich. Andererseits kann ich nicht."]

example_sentences:
  - german: "Das Wetter war schlecht. Dennoch fuhren wir ans Meer."
    english: "The weather was bad. Nevertheless, we drove to the sea."
    breakdown_focus: "dennoch at position 1 → V2 inversion: fuhren (V) wir (S)"
  - german: "Er hat lange gearbeitet. Deshalb ist er jetzt sehr erschöpft."
    english: "He worked for a long time. That's why he is very exhausted now."
    breakdown_focus: "deshalb = consequence connector; V2: ist (V) er (S) — inversion"
  - german: "Das Hotel ist komfortabel. Außerdem ist es sehr günstig gelegen."
    english: "The hotel is comfortable. Moreover, it is very conveniently located."
    breakdown_focus: "außerdem adds a supporting point; V2 inversion: ist (V) es (S)"
  - german: "Einerseits wäre ein Urlaub sehr schön. Andererseits haben wir gerade wenig Geld."
    english: "On the one hand, a vacation would be very nice. On the other hand, we don't have much money right now."
    breakdown_focus: "einerseits...andererseits pair; wäre = Konjunktiv II; haben = indicative"
  - german: "Die Maßnahme war umstritten. Jedoch unterstützte die Mehrheit der Bevölkerung sie."
    english: "The measure was controversial. However, the majority of the population supported it."
    breakdown_focus: "jedoch at position 1 → V2: unterstützte (V) die Mehrheit (S); formal register"

