id: "A1-GRM-007"
level: "A1"
category: "grammar"
title: "Indefinite Articles and kein"
prerequisites: ["A1-GRM-006"]
estimated_minutes: 18
tags: ["indefinite-articles", "ein", "kein", "negation", "articles"]

explanation:
  concept: |
    Indefinite articles mean "a / an" in English. German has three forms
    depending on grammatical gender:

    NOMINATIVE (subject):
    - Masculine: ein Hund     (a dog)
    - Feminine:  eine Katze   (a cat)
    - Neuter:    ein Buch     (a book)

    ACCUSATIVE (direct object):
    - Masculine: einen Hund   (← only masculine changes!)
    - Feminine:  eine Katze   (no change)
    - Neuter:    ein Buch     (no change)

    NEGATION with kein/keine/kein:
    To negate a noun, use kein (the negative of ein):
    - Masculine nom: kein Hund     (no dog / not a dog)
    - Feminine nom:  keine Katze   (no cat)
    - Neuter nom:    kein Buch     (no book)
    - Masculine acc: keinen Hund

    Rule: kein follows exactly the same pattern as ein.
  english_comparison: |
    English: "a" never changes regardless of gender or case.
    German: ein/eine/ein changes by gender AND case.

    English negation with nouns: "I have no dog" or "I don't have a dog"
    German: "Ich habe keinen Hund" — kein does the job of both "no" and "not a"

    Never use "nicht ein" — always use kein for negating nouns.
    WRONG: Ich habe nicht ein Hund.
    RIGHT: Ich habe keinen Hund.

example_sentences:
  - german: "Ich habe einen Hund."
    english: "I have a dog."
    breakdown_focus: "einen Hund — masculine accusative indefinite article"
  - german: "Sie kauft eine Tasche."
    english: "She buys a bag."
    breakdown_focus: "eine Tasche — feminine accusative (no change from nominative)"
  - german: "Er hat kein Auto."
    english: "He has no car / He doesn't have a car."
    breakdown_focus: "kein Auto — neuter, negation with kein"

quiz:
  questions:
    - type: "multiple_choice"
      question: "Ich sehe ___ Mann. (I see a man.) — Choose the correct indefinite article."
      options: ["ein", "eine", "einen", "kein"]
      correct_answer: "einen"
      correct_answer_index: 2
      answer_explanation: "Mann is masculine. As the direct object (accusative), ein → einen"
      grammar_rule_tested: "indefinite article masculine accusative"
      english_comparison: "English: I see A man — German accusative changes ein to einen for masculine"
      hint: "Mann is masculine and is the direct object here. What happens to 'ein' in accusative masculine?"
      points: 10
    - type: "fill_blank"
      question: "Sie hat ___ Schwester. (She has no sister.)"
      context: "Schwester = sister (feminine)"
      options: null
      correct_answer: "keine"
      correct_answer_index: null
      answer_explanation: "Schwester is feminine. To negate a feminine noun, use 'keine'. Accusative feminine kein = keine (no change)"
      grammar_rule_tested: "kein negation with feminine noun"
      english_comparison: "English: 'no sister' or 'not a sister' — German uses 'keine' for both meanings"
      hint: "To negate a noun in German, use kein/keine/kein. Schwester is feminine."
      points: 10
    - type: "multiple_choice"
      question: "Which sentence correctly says 'I have no book'?"
      options: ["Ich habe nicht ein Buch.", "Ich habe kein Buch.", "Ich habe keine Buch.", "Ich habe keinen Buch."]
      correct_answer: "Ich habe kein Buch."
      correct_answer_index: 1
      answer_explanation: "Buch is neuter. Neuter accusative of kein = kein (no change). Never use 'nicht ein' — always use kein for nouns."
      grammar_rule_tested: "kein vs nicht ein for noun negation"
      english_comparison: "English allows 'I don't have a book' or 'I have no book' — German only uses kein for noun negation"
      hint: "Buch is neuter. Which form of kein is used for neuter nouns?"
      points: 10
    - type: "translation"
      question: "Translate: A woman is buying a car."
      context: "Frau = woman (feminine), Auto = car (neuter)"
      options: null
      correct_answer: "Eine Frau kauft ein Auto."
      correct_answer_index: null
      answer_explanation: "Frau is feminine nominative subject → eine Frau. Auto is neuter accusative object → ein Auto (neuter doesn't change). kaufen → sie/er/es kauft."
      grammar_rule_tested: "indefinite articles nominative and accusative"
      english_comparison: "English uses 'a' for both subject and object — German changes the form based on case and gender"
      hint: "Frau (subject, nominative) = eine Frau. Auto (object, accusative, neuter) = ein Auto."
      points: 15
