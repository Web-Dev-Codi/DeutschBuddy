id: "A1-GRM-017"
level: "A1"
category: "grammar"
title: "Predicate Adjectives (No Endings)"
prerequisites: ["A1-GRM-004"]
estimated_minutes: 15
tags: ["adjectives", "predicative", "sein", "werden", "bleiben", "no-endings"]

explanation:
  concept: |
    German adjectives come in TWO types:

    1. PREDICATE adjectives: after sein (to be), werden (to become), bleiben (to stay)
       → NO endings added!
       "Der Mann ist groß." (The man is tall.)
       "Die Frau ist intelligent." (The woman is intelligent.)
       "Das Kind bleibt ruhig." (The child stays quiet.)

    2. ATTRIBUTIVE adjectives: directly before a noun
       → Endings MUST be added (harder — taught in A2)
       "der große Mann" (the tall man — NOT "der groß Mann")

    For A1, focus on PREDICATE adjectives — they are EASY because:
    - The adjective never changes regardless of gender or case
    - Just place it after sein/werden/bleiben

    Common adjectives you'll need:
    groß/klein (big/small), alt/jung (old/young), gut/schlecht (good/bad),
    neu/alt (new/old), schnell/langsam (fast/slow), schön/hässlich (beautiful/ugly),
    interessant/langweilig (interesting/boring), teuer/billig (expensive/cheap)
  english_comparison: |
    This works EXACTLY like English!
    "The man IS tall" — no change to "tall" regardless of subject.
    "The woman IS intelligent" — "intelligent" doesn't change.

    German predicate adjectives work the same way:
    "Der Mann ist groß." ✓
    "Die Frau ist groß." ✓ (same word, no ending!)
    "Das Kind ist groß." ✓ (same word, no ending!)

    The difficulty comes LATER with attributive adjectives:
    "der große Mann" — then endings ARE required.
    But for now: adjective after sein = NO ending. Simple!

example_sentences:
  - german: "Das Restaurant ist teuer."
    english: "The restaurant is expensive."
    breakdown_focus: "teuer after ist — no ending added, even though Restaurant is neuter"
  - german: "Meine Schwester ist sehr intelligent."
    english: "My sister is very intelligent."
    breakdown_focus: "intelligent after ist — no ending, predicate adjective"
  - german: "Das Wetter wird kalt."
    english: "The weather is becoming cold."
    breakdown_focus: "kalt after wird (werden) — predicate adjective, no ending"

quiz:
  questions:
    - type: "multiple_choice"
      question: "Die Katze ist ___. (The cat is small.) — Choose the correct form."
      options: ["klein", "kleine", "kleiner", "kleines"]
      correct_answer: "klein"
      correct_answer_index: 0
      answer_explanation: "Predicate adjectives after 'ist' (sein) take NO ending. 'klein' stays 'klein' regardless of the noun's gender."
      grammar_rule_tested: "predicate adjective no ending after sein"
      english_comparison: "English: the cat IS small — 'small' doesn't change. German: die Katze ist klein — same, no ending!"
      hint: "The adjective comes after 'ist'. What ending do predicate adjectives take after sein/werden/bleiben?"
      points: 10
    - type: "multiple_choice"
      question: "Which sentence is CORRECT?"
      options: ["Der Film ist langweiliger.", "Der Film ist langweilig.", "Der Film ist langweilige.", "Der Film ist langweiliges."]
      correct_answer: "Der Film ist langweilig."
      correct_answer_index: 1
      answer_explanation: "Predicate adjective after 'ist' = no ending. 'langweilig' stays unchanged. Never add gender/case endings to predicate adjectives."
      grammar_rule_tested: "no ending on predicate adjective"
      english_comparison: "English: the film IS boring — 'boring' doesn't change. German: der Film ist langweilig — no ending!"
      hint: "The adjective follows 'ist'. Predicate adjectives after sein have NO endings."
      points: 10
    - type: "fill_blank"
      question: "Das Wasser wird ___. (The water is getting cold.) — Use 'kalt' (cold)."
      context: "werden = to become/get"
      options: null
      correct_answer: "kalt"
      correct_answer_index: null
      answer_explanation: "Predicate adjective after 'wird' (werden) = no ending. 'kalt' stays 'kalt'."
      grammar_rule_tested: "predicate adjective after werden"
      english_comparison: "English: the water is getting cold — 'cold' doesn't change. German: das Wasser wird kalt — same!"
      hint: "werden is one of the verbs where adjectives take no ending. Just use 'kalt'."
      points: 10
    - type: "translation"
      question: "Translate: The new apartment is beautiful and expensive."
      context: "Wohnung = apartment (feminine), neu = new, schön = beautiful, teuer = expensive"
      options: null
      correct_answer: "Die neue Wohnung ist schön und teuer."
      correct_answer_index: null
      answer_explanation: "schön and teuer are predicate adjectives after 'ist' — no endings. However, 'neue' is an ATTRIBUTIVE adjective before the noun and DOES get an ending (die neue Wohnung). This previews A2 content!"
      grammar_rule_tested: "predicate adjective no ending"
      english_comparison: "English: the apartment IS beautiful and expensive — adjectives after 'is' don't change. German: ist schön und teuer."
      hint: "schön and teuer come after 'ist' — predicate adjectives. No endings needed for those two words."
      points: 15
