    - type: "multiple_choice"
      question: "What time is 'halb fünf'?"
      options: ["5:30", "4:30", "4:15", "5:15"]
      correct_answer: "4:30"
      correct_answer_index: 1
      answer_explanation: "In German, 'halb fünf' = half BEFORE five → 4:30."
      grammar_rule_tested: "meaning of 'halb' with times"
      english_comparison: "English 'half past five' = 5:30; German 'halb fünf' = 4:30."
      hint: "Think: next hour minus 30"
      points: 10

