id: "A1-GRM-025"
level: "A1"
category: "grammar"
title: "Telling Time & Dates — am / im / um"
prerequisites: ["A1-GRM-013", "A1-GRM-014"]
estimated_minutes: 18
tags: ["time", "dates", "am", "im", "um", "dative", "word-order"]

explanation:
  concept: |
    Core patterns for time and dates:

    • um + Uhrzeit (clock time): um 7 Uhr, um halb acht
    • am + Tag/Datum (days/dates/parts of day): am Montag, am 3. Mai, am Abend
    • im + Monat/Jahr/Jahreszeit: im Juli, im Jahr 2024, im Winter

    "halb" in German means 30 minutes BEFORE the next hour:
    „halb fünf“ = 4:30 (not 5:30!)

    Word order reminder: time elements often come early (Position 1),
    the conjugated verb stays in Position 2.
  english_comparison: |
    English uses "at/on/in". German maps as:
    • at → um (clock times)
    • on → am (days, dates, parts of day)
    • in → im (months, years, seasons)
    Be careful: German "halb fünf" = 4:30, not 5:30.

example_sentences:
  - german: "Das Meeting ist am Montag um 9 Uhr."
    english: "The meeting is on Monday at 9 o'clock."
    breakdown_focus: "am + Wochentag; um + Uhrzeit"
  - german: "Wir fahren im Juli nach Hamburg."
    english: "We are going to Hamburg in July."
    breakdown_focus: "im + Monat"
  - german: "Der Kurs beginnt um halb acht."
    english: "The course begins at half past seven (7:30)."
    breakdown_focus: "um + halb (next hour − 30 min)"
  - german: "Am Abend lese ich oft."
    english: "I often read in the evening."
    breakdown_focus: "Zeit am Satzanfang; Verb in Position 2"

quiz:
