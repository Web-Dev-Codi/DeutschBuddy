[project]
name = "german-tutor"
version = "0.1.0"
description = "AI-powered German language TUI for English speakers"
requires-python = ">=3.11"
dependencies = [
    "textual>=0.60.0",
    "ollama>=0.3.0",
    "aiosqlite>=0.20.0",
    "pydantic>=2.0.0",
    "pyyaml>=6.0",
    "rich>=13.0.0",
]

[project.scripts]
german-tutor = "german_tutor.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = ["textual-dev>=0.1.0"]
